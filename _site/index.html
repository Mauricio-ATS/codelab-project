<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET</title>
    <script src="https://kit.fontawesome.com/82fd7f8bff.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/atividades.css">
</head>
<body>
    <header class="site-header">
    <div class="logo">
        <img src="data/assets/icone_pet.png" alt="Logo PET" style="height: 60px;">
        <div class="texto-logo">
            <h1>pet</h1>
            <span>computação</span>
        </div>
    </div>
    
    <nav class="navigation">
        <ul>
            <li><a href="#projetos">Projetos</a></li>
            <li><a href="#membros">Membros</a></li>
            <li><a href="#sobre">Sobre Nós</a></li>
        </ul>
    </nav>
</header>

    <main class="conteudo-principal">
    <div class="banner-container">
        <img src="data/assets/banner_pet.png" alt="Imagem do PET" class="banner-img">
        <div class="banner-degrade"></div>
        <div class="banner-texto">
            <h2>Seja Bem-vindo ao PET Computação!</h2>
        </div>
    </div>
    <div class="secao-titulo">
        <img src="data/assets/icone_pet.png" alt="Ícone Pet" class="icone-secao"/>
        <span class="barra-separadora"></span>
        <h1>Nossas próximas <br> atividades</h1>
    </div>
    <div class="atividades-wrapper">
        <div class="atuais-container" id="atuais-container">
            <h2>Em andamento</h2>
            <div class="atuais-lista" id="atuais-lista"></div>
        </div>

        <div class="proximas-container">
            <div class="proximas-carrossel-wrapper">
                <div class="proximas-lista" id="proximas-lista"></div>
            </div>
            <div class="carrossel-controles">
                <button id="btn-anterior" class="btn-seta">←</button>
                <button id="btn-proximo" class="btn-seta">→</button>
            </div>
        </div>
    </div>

    <script src="/js/atividades.js"></script>
</main>

    <footer class="site-footer">
    <div class="info-footer">
        <div class="logo">
            <img src="data/assets/icone_pet.png" alt="Logo PET" style="height: 60px;">
            <div class="texto-logo">
                <h1>pet</h1>
                <span>computação</span>
            </div>
        </div>
        <span class="linha-footer">_________________________________________</span>
        <div class="redes-sociais">
            <a href="https://facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://x.com" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://linkedin.com" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </div>

    <div class="contato-footer">
        <div class="contato-item">
            <i class="fa-solid fa-envelope"></i>
            <span>petcomp@icmc.usp.br</span>
        </div>
        <div class="contato-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>Av. Trab. São Carlense, 400 - São Carlos/SP Bloco 1, sala 1-103 do ICMC</span>
        </div>
    </div>

    <div class="logo-footer">
        <img src="data/assets/logo_icmc.png" alt="ICMC" style="height: 100px;"/>
    </div>

    <div class="logo-footer">
        <img src="data/assets/logo_usp.png" alt="USP" style="height: 100px;"/>
    </div>

</footer>
    
</body>
</html>
